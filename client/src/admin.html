<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản lý Flora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        .card-stats { border-left: 5px solid #0d6efd; }
        .revenue-value { font-size: 2rem; font-weight: bold; color: #198754; }
        .product-img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-user-shield"></i> FLORA ADMIN</a>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Đăng xuất</button>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm card-stats">
                    <div class="card-body">
                        <h6 class="text-muted text-uppercase">Tổng doanh thu (Đã giao)</h6>
                        <div class="revenue-value" id="total-revenue">0đ</div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm card-stats" style="border-left-color: #ffc107;">
                    <div class="card-body">
                        <h6 class="text-muted text-uppercase">Đơn hàng mới</h6>
                        <div class="revenue-value" id="order-count" style="color: #ffc107;">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary"><i class="fa-solid fa-list"></i> Danh sách đơn hàng</h5>
            </div>
            <div class="card-body table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Khách hàng</th>
                            <th>Sản phẩm</th>
                            <th>Giá tiền</th>
                            <th>Ngày đặt</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="order-list-admin"></tbody>
                </table>
            </div>
        </div>

        <div class="card shadow-sm border-info">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-info"><i class="fa-solid fa-gem"></i> Quản lý sản phẩm & Mục</h5>
            </div>
            <div class="card-body">
                <form id="add-product-form" class="row g-2 mb-4 align-items-center p-3 bg-light rounded border">
                    <div class="col-md-3">
                        <input type="text" id="p-name" class="form-control" placeholder="Tên sản phẩm" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" id="p-price" class="form-control" placeholder="Giá (VNĐ)" required>
                    </div>
                    <div class="col-md-3">
                        <input type="url" id="p-image" class="form-control" placeholder="Link ảnh (URL)" required>
                    </div>
                    <div class="col-md-2">
                        <select id="p-category" class="form-select" required>
                            <option value="Nhẫn">Nhẫn</option>
                            <option value="Nhẫn cưới">Nhẫn cưới</option>
                            <option value="Vòng tay">Vòng tay</option>
                            <option value="Bông tai">Bông tai</option>
                            <option value="Dây chuyền">Dây chuyền</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100"><i class="fa-solid fa-plus"></i> Thêm</button>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center">
                        <thead class="table-light">
                            <tr>
                                <th>Hình ảnh</th>
                                <th>Tên sản phẩm</th>
                                <th>Danh mục</th>
                                <th>Giá bán</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="product-list-admin"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editProductModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-pen"></i> Sửa sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="edit-product-form">
                    <div class="modal-body">
                        <input type="hidden" id="edit-p-id">
                        <div class="mb-3">
                            <label class="form-label">Tên sản phẩm</label>
                            <input type="text" id="edit-p-name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Giá (VNĐ)</label>
                            <input type="number" id="edit-p-price" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Danh mục</label>
                            <select id="edit-p-category" class="form-select" required>
                                <option value="Nhẫn">Nhẫn</option>
                                <option value="Nhẫn cưới">Nhẫn cưới</option>
                                <option value="Vòng tay">Vòng tay</option>
                                <option value="Bông tai">Bông tai</option>
                                <option value="Dây chuyền">Dây chuyền</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Link ảnh (URL)</label>
                            <input type="url" id="edit-p-image" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (localStorage.getItem('isAdmin') !== 'true') window.location.href = 'index.html';
        function logout() { localStorage.removeItem('isAdmin'); window.location.href = 'login.html'; }
    </script>

    <script type="module">
        import { db } from "./js/firebase-config.js"; 
        import { collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // ---- QUẢN LÝ ĐƠN HÀNG ----
        onSnapshot(collection(db, "orders"), (snapshot) => {
            let html = "", totalRevenue = 0, count = 0;
            snapshot.forEach((orderDoc) => {
                const order = orderDoc.data();
                const id = orderDoc.id;
                const gia = parseInt(order.giaTien || 0);
                if (order.trangThai === "Đã giao") totalRevenue += gia;
                count++;
                html += `
                    <tr>
                        <td><strong>${order.tenKhach || 'Khách'}</strong><br><small class="text-muted">${order.soDienThoai}</small></td>
                        <td>${order.sanPham}</td>
                        <td class="fw-bold">${gia.toLocaleString()}đ</td>
                        <td>${order.ngayDat}</td>
                        <td>
                            <select class="form-select form-select-sm" onchange="updateStatus('${id}', this.value)">
                                <option value="Chờ xử lý" ${order.trangThai === 'Chờ xử lý' ? 'selected' : ''}>Chờ xử lý</option>
                                <option value="Đang giao" ${order.trangThai === 'Đang giao' ? 'selected' : ''}>Đang giao</option>
                                <option value="Đã giao" ${order.trangThai === 'Đã giao' ? 'selected' : ''}>Đã giao</option>
                            </select>
                        </td>
                        <td><button class="btn btn-outline-danger btn-sm" onclick="deleteOrder('${id}')"><i class="fa fa-trash"></i></button></td>
                    </tr>
                `;
            });
            document.getElementById("order-list-admin").innerHTML = html;
            document.getElementById("total-revenue").innerText = totalRevenue.toLocaleString() + "đ";
            document.getElementById("order-count").innerText = count;
        });

        window.updateStatus = async (id, newStatus) => { await updateDoc(doc(db, "orders", id), { trangThai: newStatus }); };
        window.deleteOrder = async (id) => { if(confirm("Xóa đơn hàng này?")) await deleteDoc(doc(db, "orders", id)); };

        // ---- QUẢN LÝ SẢN PHẨM ----
        onSnapshot(collection(db, "products"), (snapshot) => {
            let html = "";
            snapshot.forEach((pDoc) => {
                const sp = pDoc.data();
                const id = pDoc.id;
                const anh = sp.ImageUrl || './img/cate2_icon.webp';
                const ten = sp.name || 'Chưa có tên';
                const gia = sp.price || 0;
                const loai = sp.category || 'Khác';

                html += `
                    <tr>
                        <td><img src="${anh}" class="product-img-preview" alt="img"></td>
                        <td class="fw-bold">${ten}</td>
                        <td><span class="badge bg-secondary">${loai}</span></td>
                        <td class="text-danger fw-bold">${Number(gia).toLocaleString()}đ</td>
                        <td>
                            <button class="btn btn-warning btn-sm me-1" onclick="openEditModal('${id}', \`${ten}\`, ${gia}, '${anh}', '${loai}')"><i class="fa fa-pen"></i></button>
                            <button class="btn btn-danger btn-sm" onclick="deleteProduct('${id}')"><i class="fa fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById("product-list-admin").innerHTML = html || "<tr><td colspan='5'>Chưa có sản phẩm.</td></tr>";
        });

        // Thêm Sản Phẩm
        document.getElementById("add-product-form").addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "products"), {
                    name: document.getElementById('p-name').value,
                    price: Number(document.getElementById('p-price').value),
                    ImageUrl: document.getElementById('p-image').value,
                    category: document.getElementById('p-category').value
                });
                e.target.reset();
            } catch (error) { alert("Lỗi thêm: " + error.message); }
        });

        // Mở Modal Sửa Sản Phẩm
        window.openEditModal = function(id, name, price, img, category) {
            document.getElementById('edit-p-id').value = id;
            document.getElementById('edit-p-name').value = name;
            document.getElementById('edit-p-price').value = price;
            document.getElementById('edit-p-image').value = img;
            document.getElementById('edit-p-category').value = category;
            new bootstrap.Modal(document.getElementById('editProductModal')).show();
        };

        // Lưu Sửa Sản Phẩm
        document.getElementById('edit-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-p-id').value;
            try {
                await updateDoc(doc(db, "products", id), {
                    name: document.getElementById('edit-p-name').value,
                    price: Number(document.getElementById('edit-p-price').value),
                    ImageUrl: document.getElementById('edit-p-image').value,
                    category: document.getElementById('edit-p-category').value
                });
                bootstrap.Modal.getInstance(document.getElementById('editProductModal')).hide();
            } catch (error) { alert("Lỗi sửa: " + error.message); }
        });

        window.deleteProduct = async (id) => {
            if(confirm("Xóa sản phẩm này?")) await deleteDoc(doc(db, "products", id));
        };
    </script>
</body>
</html>
