<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Flora</title>

    <link rel="shortcut icon" href="./src/img/cate2_icon.webp" type="image/x-icon">

    <!--Bootrap 5 cdn-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!--FontAwesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--Auth css-->
    <link rel="stylesheet" href="./css/auth.css">

    <!--main css-->
    <link rel="stylesheet" href="./css/main.css">

</head>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center auth-container">
            <div class="col-md-6 border border-gray-300 shadow-md p-4 rounded-md">
                <a href="index.html" class="logo-container btn-primary">
                    <i class="fa-solid fa-house-chimey-window"></i>

                </a>
                <h5>Đăng nhập</h5>

                <form action="" id="login-form">
                    <div class="form-group mb-3">
                        <div class="input-wrapper">
                            <span class="icon"><i class="fa-solid fa-user"></i></span>
                            <input type="email" class="form-control inp-email" id="email" placeholder="Nhập Email">
                        </div>
                    </div>

                    <div class="form-group mb-3">
                        <div class="input-wrapper">
                            <span class="icon"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control inp-pw" id="password"
                                placeholder="Nhập mật khẩu">
                        </div>
                    </div>


                    <button type="submit" class="btn btn-primary btn-auth">Đăng nhập</button>
                    <p class="login-link mt-3 text-center">Bạn chưa có tài khoản ?<a href="./register.html">Đăng
                            kí</a></p>

                </form>
            </div>
        </div>
    </div>

    <script type="module" src="./js/login.js"></script>

    <!--Bootrap 5 cdn-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>






</body>

</html>
