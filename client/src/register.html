<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng kí - Flora</title>

    <!--Bootrap 5 cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!--FontAwesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--Auth css-->
 <link rel="stylesheet" href="./css/auth.css">

    <!--main css-->
   <link rel="stylesheet" href="./css/main.css">

</head>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center auth-container">
            <div class="col-md-6 border border-gray-300 shadow-md p-4 rounded-md">
                <a href="index.html" class="logo-container btn-primary">
                    <i class="fa-solid fa-house"></i>

                </a>

                <h5> Đăng kí</h5>
              
                 <form action="" id="register-form"> <div class="form-group mb-3">
                        <div class="input-wrapper">
                            <span class="icon"><i class="fa-solid fa-user"></i></span>
                            <input type="text" class="form-control inp-username" id="username" placeholder="Name">
                        </div>
                    </div>


                    <div class="form-group mb-3">
                        <div class="input-wrapper">
                            <span class="icon" ><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" class="form-control inp-email" id="email" placeholder="Email">
                        </div>
                    </div>

                
                     <div class="form-group mb-3">
                        <div class="input-wrapper">
                            <span class="icon" ><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control inp-cf-pwd" id="password" placeholder="Password">
                        </div>
                    </div>


                    <div class="form-group mb-3">
                        <div class="input-wrapper">
                            <span class="icon" ><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control inp-cf-pwd" id="confirm-password" placeholder="Confirm Password">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-auth">Đăng kí</button>
                </form>

                <p class="login-link mt-3 text-center">Đã có tài khoản ? <a href="./login.html">Đăng nhập

                </a></p>
            </div>
        </div>
    </div>

    <!--Bootrap 5 cdn-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    
        <!--register js-->
        <script type="module" src="../src/js/register.js"></script>

      
</body>


</html>
